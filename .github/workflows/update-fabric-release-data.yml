name: Update Fabric Release Data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r github-pages-solution/scripts/requirements.txt

      - name: Refresh data file
        run: python github-pages-solution/scripts/update_data.py

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- github-pages-solution/docs/data/releases.json; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-pages-solution/docs/data/releases.json
          git commit -m "chore: refresh fabric release data"
          git push
